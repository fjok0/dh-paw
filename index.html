<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>DH</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./assets/logo-192.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

<!-- HEADER -->
<header>
  <span class="logo">DH</span>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="sync-status"><span id="conn-dot"></span>—</span>
    <button id="btn-sync" title="Sincronizar" style="background:none;border:none;cursor:pointer;color:var(--silver2);padding:4px" aria-label="Sincronizar">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2">
        <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
    </button>
    <button id="btn-settings" title="Configurar PocketBase" style="background:none;border:none;cursor:pointer;color:var(--silver2);padding:4px" aria-label="Ajustes">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
</header>

<!-- VIEWS -->
<main>
  <div id="view-reparto"  class="view"></div>
  <div id="view-acciones" class="view"></div>
  <div id="view-opciones" class="view"></div>
</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button id="tab-reparto">
    <svg viewBox="0 0 24 24"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>
    Reparto
  </button>
  <button id="tab-acciones">
    <svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
    Acciones
  </button>
  <button id="tab-opciones">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    Opciones
  </button>
</nav>

<!-- TOAST -->
<div id="toast"></div>

<!-- SETTINGS DIALOG -->
<dialog id="settings-dialog" style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;color:var(--text);font-family:inherit;max-width:340px;width:90%">
  <h2 style="font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--silver);margin-bottom:1rem">Configuración</h2>
  <label style="display:block;font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">URL de PocketBase</label>
  <input id="pb-url" type="url" placeholder="http://192.168.x.x:8090"
    style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:inherit;font-size:0.8rem;outline:none;margin-bottom:1rem" />
  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button onclick="document.getElementById('settings-dialog').close()"
      style="background:none;border:1px solid var(--border);border-radius:6px;padding:6px 14px;color:var(--muted);font-family:inherit;font-size:0.75rem;cursor:pointer">
      Cancelar
    </button>
    <button id="settings-save"
      style="background:var(--positive);border:none;border-radius:6px;padding:6px 14px;color:#000;font-family:inherit;font-size:0.75rem;font-weight:700;cursor:pointer">
      Guardar
    </button>
  </div>
</dialog>

<script src="./lib/dexie.min.js"></script>
<script type="module" src="./js/app.js"></script>
</body>
</html>
